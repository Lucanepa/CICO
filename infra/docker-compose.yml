name: cico

services:
  postgres:
    image: postgres:17-alpine
    container_name: cico-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: ${TZ:-Europe/Zurich}
    volumes:
      - ${PGDATA_PATH:-./pgdata}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    container_name: cico-api
    hostname: cico-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      SESSION_SECRET: ${SESSION_SECRET}
      TZ: ${TZ:-Europe/Zurich}
      WEB_BASE_URL: ${WEB_BASE_URL}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      SENTRY_DSN_API: ${SENTRY_DSN_API}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
      OURA_CLIENT_ID: ${OURA_CLIENT_ID}
      OURA_CLIENT_SECRET: ${OURA_CLIENT_SECRET}
      OURA_REDIRECT_URI: ${OURA_REDIRECT_URI}
      STRAVA_CLIENT_ID: ${STRAVA_CLIENT_ID}
      STRAVA_CLIENT_SECRET: ${STRAVA_CLIENT_SECRET}
      STRAVA_REDIRECT_URI: ${STRAVA_REDIRECT_URI}
      STRAVA_WEBHOOK_VERIFY_TOKEN: ${STRAVA_WEBHOOK_VERIFY_TOKEN}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
      GOOGLE_DRIVE_FOLDER_ID: ${GOOGLE_DRIVE_FOLDER_ID}
      WITHINGS_CLIENT_ID: ${WITHINGS_CLIENT_ID}
      WITHINGS_CLIENT_SECRET: ${WITHINGS_CLIENT_SECRET}
      WITHINGS_REDIRECT_URI: ${WITHINGS_REDIRECT_URI}
      USDA_API_KEY: ${USDA_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      CRON_PREWARM_SCHEDULE: ${CRON_PREWARM_SCHEDULE:-0 3 * * *}
      DEFAULT_USER_EMAIL: ${DEFAULT_USER_EMAIL:-me@cico.local}
      DIRECTUS_URL: ${DIRECTUS_URL}
      DIRECTUS_REQUIRED_ROLE: ${DIRECTUS_REQUIRED_ROLE}
    expose:
      - "8787"

  directus:
    image: directus/directus:11
    container_name: cico-directus
    hostname: cico-directus
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      KEY: ${DIRECTUS_KEY}
      SECRET: ${DIRECTUS_SECRET}
      ADMIN_EMAIL: ${DIRECTUS_ADMIN_EMAIL}
      ADMIN_PASSWORD: ${DIRECTUS_ADMIN_PASSWORD}
      PUBLIC_URL: ${DIRECTUS_PUBLIC_URL:-https://cico-directus.lucanepa.com}
      DB_CLIENT: pg
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_DATABASE: ${DIRECTUS_DB_DATABASE:-directus}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      CORS_ENABLED: "true"
      CORS_ORIGIN: ${ALLOWED_ORIGINS}
      CORS_CREDENTIALS: "true"
      WEBSOCKETS_ENABLED: "false"
      TELEMETRY: "false"
      LOG_LEVEL: ${DIRECTUS_LOG_LEVEL:-info}
    volumes:
      - ${DIRECTUS_UPLOADS_PATH:-./directus/uploads}:/directus/uploads
      - ${DIRECTUS_EXTENSIONS_PATH:-./directus/extensions}:/directus/extensions
    expose:
      - "8055"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cico-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    depends_on:
      - api
      - directus
